name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (npm)
        run: npm ci

      # --- Collect external dependencies ---

      - name: Setup Java (for jlink + apktool/apksigner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build minimal JRE (jlink)
        shell: bash
        run: |
          MODULES="java.base,java.desktop,java.logging,java.xml,jdk.crypto.ec,java.security.jgss,java.naming"
          jlink \
            --add-modules "$MODULES" \
            --output src-tauri/resources/jre \
            --no-header-files \
            --no-man-pages \
            --strip-debug \
            --compress=zip-6
          # Remove legal dir (causes Tauri build issues) and symlinks
          rm -rf src-tauri/resources/jre/legal
          find src-tauri/resources/jre -type l | while read link; do
            target=$(readlink -f "$link" 2>/dev/null || python3 -c "import os; print(os.path.realpath('$link'))")
            rm "$link"
            cp "$target" "$link"
          done
          echo "JRE size: $(du -sh src-tauri/resources/jre | cut -f1)"

      - name: Collect scrcpy-server
        shell: bash
        run: |
          mkdir -p src-tauri/resources
          SCRCPY_VERSION="3.3.4"
          curl -fL "https://github.com/Genymobile/scrcpy/releases/download/v${SCRCPY_VERSION}/scrcpy-server-v${SCRCPY_VERSION}" \
            -o src-tauri/resources/scrcpy-server.jar && echo "Downloaded scrcpy-server v${SCRCPY_VERSION}" || \
          { echo "ERROR: scrcpy-server download failed"; exit 1; }

      - name: Collect adb (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p src-tauri/resources/bin
          curl -L https://dl.google.com/android/repository/platform-tools-latest-darwin.zip -o /tmp/pt.zip
          unzip -o /tmp/pt.zip -d /tmp/pt
          cp /tmp/pt/platform-tools/adb src-tauri/resources/bin/adb
          chmod +x src-tauri/resources/bin/adb

      - name: Collect adb (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/resources/bin
          curl -L https://dl.google.com/android/repository/platform-tools-latest-windows.zip -o /tmp/pt.zip
          unzip -o /tmp/pt.zip -d /tmp/pt
          cp /tmp/pt/platform-tools/adb.exe src-tauri/resources/bin/adb.exe
          cp /tmp/pt/platform-tools/AdbWinApi.dll src-tauri/resources/bin/AdbWinApi.dll
          cp /tmp/pt/platform-tools/AdbWinUsbApi.dll src-tauri/resources/bin/AdbWinUsbApi.dll

      - name: Collect apktool
        shell: bash
        run: |
          APKTOOL_VERSION="2.11.1"
          curl -fL "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar" \
            -o src-tauri/resources/apktool.jar && echo "Downloaded apktool v${APKTOOL_VERSION}" || \
          { echo "ERROR: apktool download failed"; exit 1; }

      - name: Setup Android SDK (for apksigner + zipalign)
        uses: android-actions/setup-android@v3

      - name: Collect apksigner + zipalign
        shell: bash
        run: |
          # Find build-tools installed by setup-android
          BT_DIR=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          echo "Build tools dir: $BT_DIR"
          if [ -f "$BT_DIR/lib/apksigner.jar" ]; then
            cp "$BT_DIR/lib/apksigner.jar" src-tauri/resources/apksigner.jar
            echo "Copied apksigner.jar"
          fi
          if [ -f "$BT_DIR/zipalign" ]; then
            cp "$BT_DIR/zipalign" src-tauri/resources/bin/zipalign
            chmod +x src-tauri/resources/bin/zipalign
            echo "Copied zipalign"
          elif [ -f "$BT_DIR/zipalign.exe" ]; then
            cp "$BT_DIR/zipalign.exe" src-tauri/resources/bin/zipalign.exe
            echo "Copied zipalign.exe"
          fi

      - name: Verify resources
        shell: bash
        run: |
          echo "=== Resources ==="
          ls -lh src-tauri/resources/ 2>/dev/null || true
          ls -lh src-tauri/resources/bin/ 2>/dev/null || true
          ls -lh src-tauri/resources/jre/bin/ 2>/dev/null || true
          # Sanity check: scrcpy-server must be >50KB (a 9-byte file means a failed download)
          MIN_SIZE=50000
          ACTUAL=$(wc -c < src-tauri/resources/scrcpy-server.jar)
          if [ "$ACTUAL" -lt "$MIN_SIZE" ]; then
            echo "ERROR: scrcpy-server.jar is only ${ACTUAL} bytes (expected >50KB). Download likely failed."
            exit 1
          fi

      # --- Build ---

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dokky ${{ github.ref_name }}"
          releaseBody: "Download Dokky for your platform."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
